{% extends "school/student_dashboard.html" %}
{% load static %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-4">
  <div class="row">
    <div class="col-md-8 mx-auto">

      <!-- Header -->
      <div class="card shadow-sm mb-4" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none;">
        <div class="card-body text-white">
          <h2 style="font-weight: 700; margin-bottom: 0;">
            <i class="fas fa-pen"></i> Create New Post
          </h2>
        </div>
      </div>

      <!-- Form Card -->
      <div class="card shadow mb-4">
        <div class="card-body">
          <!-- ⚡ Dikkat: enctype ekledik -->
          <form method="post" enctype="multipart/form-data" novalidate>
            {% csrf_token %}
            
            <!-- Content -->
            <div class="mb-4">
              {{ form.content }}
            </div>

            <!-- Image -->
            <div class="mb-4">
              {{ form.image }}
            </div>

            <!-- Category -->
            <div class="mb-3">
              <label>Category</label>
              {{ form.kategorie }}
            </div>

            <!-- Error Messages -->
            {% if form.non_field_errors %}
              <div class="alert alert-danger">
                {{ form.non_field_errors }}
              </div>
            {% endif %}

            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary btn-lg w-100" style="background-color: #1da1f2; border-color: #1da1f2; font-weight: 600;">
              <i class="fas fa-paper-plane"></i> Send Post
            </button>
          </form>
        </div>
      </div>

      <!-- Navigation Buttons -->
      <div class="d-flex gap-2 mb-4">
        <a href="{% url 'student_dashboard' %}" class="btn btn-outline-secondary flex-grow-1">
          <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
        <a href="{% url 'post_list' %}" class="btn btn-outline-secondary flex-grow-1">
          <i class="fas fa-list"></i> All Posts
        </a>
      </div>

    </div>
  </div>
</div>

<style>
  .form-control, .form-select, textarea {
    border-radius: 8px;
    border: 1px solid #e0e0e0;
    padding: 12px;
    font-size: 1rem;
  }
  .form-control:focus, textarea:focus {
    border-color: #1da1f2;
    box-shadow: 0 0 0 0.2rem rgba(29, 161, 242, 0.25);
  }
  textarea {
    resize: vertical;
    min-height: 150px;
  }
  .btn-primary:hover {
    background-color: #1a91da !important;
    border-color: #1a91da !important;
  }
  .card {
    border: none;
    border-radius: 12px;
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}
