<!--hier ist Register Seite fur Schuler-->
{% extends "school/base.html" %}
{% load i18n %}
{% block content %}
<div class="container mt-5" style="max-width: 600px;">
  <h3 class="mb-4 text-center">{% trans "Student Registration" %}</h3>
  <form>
    <div class="mb-3">
      <label for="username" class="form-label">{% trans "Username" %}</label>
      <input type="text" class="form-control form-control-lg" id="username" name="username" placeholder="Username">
    </div>

    <div class="mb-3">
      <label for="firstname" class="form-label">{% trans "Firstname" %}</label>
      <input type="text" class="form-control form-control-lg" id="firstname" name="firstname" placeholder="Firstname">
    </div>

    <div class="mb-3">
      <label for="lastname" class="form-label">{% trans "Lastname" %}</label>
      <input type="text" class="form-control form-control-lg" id="lastname" name="lastname" placeholder="Lastname">
    </div>

    <div class="mb-3">
      <label for="email" class="form-label">{% trans "Email" %}</label>
      <input type="email" class="form-control form-control-lg" id="email" name="email" placeholder="Email">
    </div>

    <div class="mb-3">
      <label for="password" class="form-label">{% trans "Password" %}</label>
      <input type="password" class="form-control form-control-lg" id="password" name="password" placeholder="Password">
    </div>

    <div class="mb-3">
      <label for="repassword" class="form-label">{% trans "Re-Password" %}</label>
      <input type="password" class="form-control form-control-lg" id="repassword" name="repassword" placeholder="Re-Password">
    </div>

    <button type="submit" class="btn btn-primary btn-lg w-100">{% trans "Sign in" %}</button>
  </form>
</div>
{% endblock %}
