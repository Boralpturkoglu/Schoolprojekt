{% load i18n %}
<!DOCTYPE html>
<html lang="en">

<!--Das ist die Seite zum Noten Abgeben-->

<head>
  <meta charset="UTF-8">
  <!--Titel Name-->
  <title>{% trans "Add Grade" %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap Link -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- 
Diese Seite ermöglicht es Lehrern, Noten für Schüler einzugeben.
Die ausgewählte Unterrichtseinheit und der Schüler werden angezeigt.
Nach Eingabe der Note kann diese gespeichert werden.
-->

  <style>
    body {
      background-color: #f4f6f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      border-radius: 14px;
      width: 100%;
      max-width: 500px;
    }

    .header {
      font-size: 1.25rem;
      font-weight: 600;
    }

    /* 🌍 Language button */
    .language-switcher {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
    }
  </style>
</head>

<body>

<!-- ========================= -->
<!-- 🌍 LANGUAGE SWITCHER -->
<!-- ========================= -->
<div class="language-switcher">
  <div class="dropdown">
    <button class="btn btn-light btn-sm dropdown-toggle shadow"
            type="button"
            data-bs-toggle="dropdown">

      {% get_current_language as LANGUAGE_CODE %}
      {{ LANGUAGE_CODE|upper }}

    </button>

    <ul class="dropdown-menu dropdown-menu-end">

      <li>
        <form action="{% url 'set_language' %}" method="post">
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ request.path }}">
          <button type="submit" name="language" value="en" class="dropdown-item">
            🇬🇧 English
          </button>
        </form>
      </li>

      <li>
        <form action="{% url 'set_language' %}" method="post">
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ request.path }}">
          <button type="submit" name="language" value="de" class="dropdown-item">
            🇩🇪 Deutsch
          </button>
        </form>
      </li>

    </ul>
  </div>
</div>

<!-- ========================= -->
<!-- PAGE CONTENT -->
<!-- ========================= -->

<div class="card shadow">
  <div class="card-body">

    <div class="header mb-3 text-center">
      {% trans "➕ Add Grade" %}
    </div>

    <p class="text-muted text-center">
      <strong>Lesson:</strong> {{ enrollment.lesson.name }} <br> 
      <strong>Student:</strong> {{ enrollment.student.user.username }}
    </p>

    <hr>

    <!-- Formular zur Noteneingabe -->
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}

      <div class="d-flex justify-content-between mt-4">

        <!-- Zurück Button -->
        <a href="{% url 'teacher_dashboard' %}" class="btn btn-outline-secondary">
          {% trans "Back" %}
        </a>

        <!-- Speichern Button -->
        <button type="submit" class="btn btn-primary">
          {% trans "Save" %}
        </button>

      </div>
    </form>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
