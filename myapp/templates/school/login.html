{% extends "school/base.html" %}
{% load i18n %}
{% block content %}
<form method="POST">
  {% csrf_token %}
  {% if error %}
    <div class="alert alert-danger">
      {{ error }}
    </div>
  {% endif %}

  <!-- Username -->
  <div data-mdb-input-init class="form-outline mb-4">
    <input type="text" id="username" name="username" class="form-control" />
    <label class="form-label" for="username">{% trans "Username" %}</label>
  </div>

  <!-- Password -->
  <div data-mdb-input-init class="form-outline mb-4">
    <input type="password" id="password" name="password" class="form-control" />
    <label class="form-label" for="password">{% trans "Password" %}</label>
  </div>

  <!-- Submit -->
  <button type="submit" data-mdb-button-init data-mdb-ripple-init class="btn btn-primary btn-block mb-4">
    {% trans "Sign in" %}
  </button>

  <div class="text-center">
    <p>{% blocktrans %}Do you have not Account? Let's{% endblocktrans %} <a href="{% url 'register' %}">{% trans "Register" %}</p>
  </div>
</form>
{% endblock %}
