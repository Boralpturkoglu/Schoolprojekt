<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
</head>

<body style="padding:20px;">

  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">

   <!-- Add Event Button -->
<a href="{% url 'add_event' %}" 
   class="btn btn-success btn-lg"
   style="background: linear-gradient(135deg, #28a745 0%, #20c997 100%); 
          border: none; 
          font-weight: 600; 
          padding: 12px 30px;
          border-radius: 8px;
          box-shadow: 0px 4px 10px rgba(40, 167, 69, 0.3);
          transition: all 0.3s ease;">
   <i class="fas fa-plus-circle"></i> Add Event
</a>

<!-- Back Button -->
<a href="{% url 'teacher_dashboard' %}" 
   class="btn btn-outline-secondary btn-lg"
   style="font-weight: 600; 
          padding: 12px 30px;
          border-radius: 8px;
          border: 2px solid #6c757d;
          transition: all 0.3s ease;"
   onmouseover="this.style.backgroundColor='#6c757d'; this.style.color='white';"
   onmouseout="this.style.backgroundColor='transparent'; this.style.color='#6c757d';">
   <i class="fas fa-arrow-left"></i> Back
</a>

  </div>

  <div id="calendar"></div>

  <script>
  document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');

    var calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      height: 700,
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,timeGridWeek,timeGridDay'
      },
      events: "{% url 'event_list' %}"
    });

    calendar.render();
  });
  </script>

</body>
</html>
